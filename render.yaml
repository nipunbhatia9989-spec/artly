services:
  - type: web
    name: artly
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        value: nipun.bhatia9989@gmail.com
      - key: DATABASE_URL
        fromDatabase:
          name: artly-db
          property: connectionString

databases:
  - name: artly-db
    databaseName: artly
    plan: free
